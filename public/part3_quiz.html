<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCQ Quiz – GHS Mbonjo CS</title>
<style>
* { -webkit-user-select:none; -moz-user-select:none; user-select:none; }
@media print { body { display:none !important; } }
:root { --green:#006633;--gold:#FFD700;--dark:#1a1a2e;--card:#16213e;--accent:#0f3460;--text:#e0e0e0;--white:#fff;--red:#e74c3c;--blue:#3498db;--radius:12px; }
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;}
.topbar{background:linear-gradient(135deg,var(--green),#004d26);border-bottom:3px solid var(--gold);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-title{font-size:15px;font-weight:700;color:var(--white);}
.topbar-title span{color:var(--gold);}
.back-btn{background:rgba(255,215,0,0.15);border:1px solid rgba(255,215,0,0.3);color:var(--gold);padding:7px 14px;border-radius:20px;font-size:13px;cursor:pointer;font-weight:600;transition:all 0.2s;}
.back-btn:hover{background:rgba(255,215,0,0.25);}
.container{max-width:780px;margin:0 auto;padding:20px 16px;}

/* TOPIC SELECT */
#topicSelect{animation:fadeIn 0.4s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.page-title{font-size:22px;font-weight:800;color:var(--gold);margin-bottom:6px;}
.page-sub{font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:24px;}
.topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-bottom:30px;}
.topic-btn{background:var(--card);border:1px solid rgba(255,255,255,0.07);border-radius:var(--radius);padding:18px 16px;cursor:pointer;transition:all 0.3s;text-align:left;}
.topic-btn:hover{border-color:rgba(255,215,0,0.4);transform:translateY(-3px);box-shadow:0 6px 20px rgba(255,215,0,0.1);}
.topic-btn .t-icon{font-size:26px;margin-bottom:8px;display:block;}
.topic-btn .t-name{font-size:14px;font-weight:700;color:var(--white);margin-bottom:4px;}
.topic-btn .t-count{font-size:12px;color:rgba(255,255,255,0.4);}

/* QUIZ SETTINGS */
#quizSettings{display:none;animation:fadeIn 0.4s ease;}
.settings-card{background:var(--card);border-radius:var(--radius);padding:24px;border:1px solid rgba(255,215,0,0.15);margin-bottom:20px;}
.settings-card h3{color:var(--gold);font-size:17px;margin-bottom:16px;}
.setting-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.setting-row label{font-size:14px;color:rgba(255,255,255,0.7);}
.setting-row select{background:#0f3460;border:1px solid rgba(255,215,0,0.2);color:var(--white);padding:8px 12px;border-radius:8px;font-size:13px;-webkit-user-select:auto;user-select:auto;}
.start-quiz-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--gold),#e6c200);color:#1a1a2e;border:none;border-radius:var(--radius);font-size:16px;font-weight:800;cursor:pointer;text-transform:uppercase;letter-spacing:1px;transition:all 0.3s;}
.start-quiz-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,215,0,0.4);}

/* QUIZ RUNNER */
#quizRunner{display:none;animation:fadeIn 0.4s ease;}
.quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.progress-info{font-size:13px;color:rgba(255,255,255,0.6);}
.progress-info span{color:var(--gold);font-weight:700;}
.timer-badge{background:rgba(255,165,0,0.15);border:1px solid rgba(255,165,0,0.3);color:orange;padding:6px 14px;border-radius:20px;font-size:14px;font-weight:700;min-width:70px;text-align:center;}
.timer-badge.warn{background:rgba(231,76,60,0.2);border-color:rgba(231,76,60,0.4);color:#ff6b6b;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
.progress-bar{height:6px;background:rgba(255,255,255,0.08);border-radius:3px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--gold));border-radius:3px;transition:width 0.5s ease;}
.score-live{font-size:12px;color:rgba(255,255,255,0.4);text-align:right;margin-bottom:16px;}

.question-card{background:var(--card);border-radius:var(--radius);padding:24px;border:1px solid rgba(255,255,255,0.07);margin-bottom:16px;box-shadow:0 4px 20px rgba(0,0,0,0.3);}
.q-meta{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.q-num{background:rgba(255,215,0,0.15);color:var(--gold);padding:4px 10px;border-radius:10px;font-size:12px;font-weight:700;}
.q-topic{background:rgba(52,152,219,0.1);color:var(--blue);border:1px solid rgba(52,152,219,0.2);padding:3px 10px;border-radius:10px;font-size:11px;}
.q-source{font-size:11px;color:rgba(255,255,255,0.3);}
.q-text{font-size:15px;color:var(--white);line-height:1.7;margin-bottom:20px;}
.q-text code{background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.2);border-radius:4px;padding:2px 6px;font-family:monospace;font-size:13px;color:var(--gold);}

.options-list{display:flex;flex-direction:column;gap:10px;}
.option-btn{display:flex;align-items:center;gap:12px;padding:14px 16px;background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.09);border-radius:10px;cursor:pointer;transition:all 0.2s;text-align:left;width:100%;}
.option-btn:hover:not(:disabled){background:rgba(255,215,0,0.08);border-color:rgba(255,215,0,0.3);}
.option-btn:disabled{cursor:default;}
.option-letter{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.option-text{font-size:14px;color:rgba(255,255,255,0.85);flex:1;line-height:1.4;}
.option-btn.correct{background:rgba(0,200,80,0.12);border-color:rgba(0,200,80,0.5);}
.option-btn.correct .option-letter{background:rgba(0,200,80,0.3);color:#2ecc71;}
.option-btn.wrong{background:rgba(231,76,60,0.12);border-color:rgba(231,76,60,0.5);}
.option-btn.wrong .option-letter{background:rgba(231,76,60,0.3);color:#ff6b6b;}

.feedback-box{margin-top:16px;border-radius:10px;padding:16px;display:none;animation:fadeIn 0.3s ease;}
.feedback-box.correct-fb{background:rgba(0,200,80,0.1);border:1px solid rgba(0,200,80,0.3);}
.feedback-box.wrong-fb{background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,0.3);}
.feedback-box .fb-title{font-size:14px;font-weight:700;margin-bottom:8px;}
.feedback-box .fb-title.c{color:#2ecc71;}
.feedback-box .fb-title.w{color:#ff6b6b;}
.feedback-box .fb-exp{font-size:13px;color:rgba(255,255,255,0.75);line-height:1.6;}
.feedback-box .wrong-others{margin-top:10px;}
.feedback-box .wrong-others p{font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:4px;font-style:italic;}
.feedback-box .wrong-others li{font-size:12px;color:rgba(255,255,255,0.5);margin-left:16px;margin-bottom:3px;}

.next-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),#e6c200);color:#1a1a2e;border:none;border-radius:10px;font-size:15px;font-weight:800;cursor:pointer;margin-top:14px;display:none;transition:all 0.3s;}
.next-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,215,0,0.4);}

/* RESULTS */
#quizResults{display:none;animation:fadeIn 0.5s ease;}
.result-card{background:var(--card);border-radius:20px;padding:30px 24px;text-align:center;border:2px solid var(--gold);box-shadow:0 0 40px rgba(255,215,0,0.15);margin-bottom:20px;}
.result-score{font-size:64px;font-weight:900;margin-bottom:6px;}
.result-score.pass{color:#2ecc71;}
.result-score.fail{color:#e74c3c;}
.result-grade{font-size:20px;font-weight:700;margin-bottom:16px;color:var(--gold);}
.result-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:20px 0;}
.r-stat{background:rgba(255,255,255,0.05);border-radius:10px;padding:14px 8px;text-align:center;}
.r-stat .rn{font-size:24px;font-weight:800;color:var(--gold);}
.r-stat .rl{font-size:11px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px;}
.retry-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--gold),#e6c200);color:#1a1a2e;border:none;border-radius:var(--radius);font-size:15px;font-weight:800;cursor:pointer;margin-bottom:10px;transition:all 0.3s;}
.retry-btn:hover{transform:translateY(-2px);}
.home-btn{width:100%;padding:13px;background:rgba(255,255,255,0.07);color:var(--text);border:1px solid rgba(255,255,255,0.1);border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;}
.review-section{margin-top:20px;}
.review-section h3{font-size:17px;color:var(--gold);margin-bottom:14px;}
.review-item{background:var(--card);border-radius:10px;padding:16px;margin-bottom:12px;border:1px solid rgba(255,255,255,0.07);}
.review-item.ri-correct{border-left:4px solid #2ecc71;}
.review-item.ri-wrong{border-left:4px solid #e74c3c;}
.ri-q{font-size:13px;color:rgba(255,255,255,0.8);margin-bottom:8px;line-height:1.5;}
.ri-answer{font-size:12px;margin-bottom:4px;}
.ri-answer .lbl{color:rgba(255,255,255,0.4);}
.ri-answer .val-correct{color:#2ecc71;font-weight:700;}
.ri-answer .val-wrong{color:#e74c3c;font-weight:700;}
.ri-exp{font-size:12px;color:rgba(255,255,255,0.5);font-style:italic;margin-top:6px;line-height:1.5;}

@media(max-width:480px){
  .container{padding:14px 12px;}
  .q-text{font-size:14px;}
  .option-text{font-size:13px;}
  .result-score{font-size:48px;}
}
</style>
</head>
<body>
<div class="topbar">
  <button class="back-btn" onclick="goBack()">← Back</button>
  <div class="topbar-title">CS e-Learning &nbsp;·&nbsp; <span>MCQ Quiz</span></div>
  <div style="font-size:12px;color:var(--gold);font-weight:700" id="topUserBadge"></div>
</div>

<div class="container">

<!-- TOPIC SELECT -->
<div id="topicSelect">
  <div class="page-title">✅ MCQ Practice</div>
  <div class="page-sub">Select a topic to practice. Questions are graded with instant feedback and explanations.</div>
  <div class="topic-grid" id="topicGrid"></div>
</div>

<!-- QUIZ SETTINGS -->
<div id="quizSettings">
  <div class="settings-card">
    <h3 id="settingsTopicName">📋 Quiz Settings</h3>
    <div class="setting-row">
      <label>Number of Questions</label>
      <select id="numQuestionsSelect">
        <option value="10">10 Questions</option>
        <option value="20" selected>20 Questions</option>
        <option value="30">30 Questions</option>
        <option value="all">All Questions</option>
      </select>
    </div>
    <div class="setting-row">
      <label>Timer per question</label>
      <select id="timerSelect">
        <option value="0">No Timer</option>
        <option value="45" selected>45 Seconds</option>
        <option value="60">60 Seconds</option>
        <option value="90">90 Seconds</option>
      </select>
    </div>
    <div class="setting-row">
      <label>Question Order</label>
      <select id="orderSelect">
        <option value="random" selected>Random</option>
        <option value="sequential">Sequential</option>
      </select>
    </div>
  </div>
  <button class="start-quiz-btn" onclick="launchQuiz()">🚀 Start Quiz</button>
  <button class="home-btn" style="margin-top:10px" onclick="document.getElementById('quizSettings').style.display='none';document.getElementById('topicSelect').style.display='block'">← Choose Different Topic</button>
</div>

<!-- QUIZ RUNNER -->
<div id="quizRunner">
  <div class="quiz-header">
    <div class="progress-info">Question <span id="qNum">1</span> of <span id="qTotal">20</span></div>
    <div class="timer-badge" id="timerBadge" style="display:none">⏱ 45</div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="score-live" id="scoreLive">Score: 0 / 0</div>
  <div id="questionArea"></div>
</div>

<!-- RESULTS -->
<div id="quizResults">
  <div class="result-card">
    <div id="resultScore" class="result-score pass">0%</div>
    <div id="resultGrade" class="result-grade"></div>
    <div id="resultMsg" style="font-size:13px;color:rgba(255,255,255,0.6);margin-bottom:16px"></div>
    <div class="result-stats">
      <div class="r-stat"><div class="rn" id="rCorrect">0</div><div class="rl">Correct</div></div>
      <div class="r-stat"><div class="rn" id="rWrong">0</div><div class="rl">Wrong</div></div>
      <div class="r-stat"><div class="rn" id="rSkipped">0</div><div class="rl">Skipped</div></div>
    </div>
    <button class="retry-btn" onclick="retryQuiz()">🔄 Retry This Quiz</button>
    <button class="home-btn" onclick="showTopicSelect()">🏠 Choose New Topic</button>
  </div>
  <div class="review-section">
    <h3>📋 Review Your Answers</h3>
    <div id="reviewList"></div>
  </div>
</div>

</div><!-- container -->

<script>
// PROTECTION
document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&['c','p','s','u','a'].includes(e.key.toLowerCase()))e.preventDefault();
  if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&['i','j'].includes(e.key.toLowerCase())))e.preventDefault();
});

// SESSION
const userCIN = sessionStorage.getItem('userCIN');
const userName = sessionStorage.getItem('userName');
if(!userCIN){ window.location.href='index.html'; }
document.getElementById('topUserBadge').textContent = '👤 ' + (userName||'').split(' ')[0];

function goBack(){ window.location.href='part2_platform.html'; }

// ============================================================
// QUESTION BANK — 200+ questions with answers & explanations
// ============================================================
const ALL_QUESTIONS = [
// ─── COMPUTER HARDWARE (30) ─────────────────────────────────
{id:1,topic:'Computer Hardware',source:'HIHS Mock 2024',
 q:'Which bus carries the location (address) of data in RAM to the CPU?',
 opts:['A. Control Bus','B. Address Bus','C. Data Bus','D. Location Bus'],
 ans:1, exp:'The Address Bus carries memory addresses — locations in RAM where data should be read from or written to. It is unidirectional (CPU to memory).',
 wrong:{'A':'The Control Bus carries control signals (read/write commands), not addresses.','C':'The Data Bus carries the actual data between the CPU and memory.','D':'Location Bus is not a real computing term.'}
},
{id:2,topic:'Computer Hardware',source:'SW Mock 2026',
 q:'Which component of the CPU executes decoded instructions during the machine cycle?',
 opts:['A. Control Unit','B. Fetch Unit','C. CPU','D. Arithmetic Logic Unit (ALU)'],
 ans:3, exp:'The ALU performs all arithmetic (add, subtract) and logical (AND, OR, compare) operations — it executes decoded instructions.',
 wrong:{'A':'The Control Unit manages the sequence of operations but does not execute arithmetic/logic.','B':'Fetch Unit is not a standard component name; fetching is done by the CU.','C':'The CPU contains both the CU and ALU — it is the whole processor.'}
},
{id:3,topic:'Computer Hardware',source:'GCE Past',
 q:'Which type of memory loses its contents when the computer is switched off?',
 opts:['A. ROM','B. Cache','C. RAM','D. Hard disk'],
 ans:2, exp:'RAM (Random Access Memory) is volatile — it loses all its contents when power is removed. This is why you must save your work before switching off.',
 wrong:{'A':'ROM (Read-Only Memory) is non-volatile — it retains data without power.','B':'Cache is faster than RAM but is also volatile; however RAM is the standard answer for this question.','D':'Hard disk is secondary storage, non-volatile.'}
},
{id:4,topic:'Computer Hardware',source:'HIHS Mock 2025',
 q:'What is the function of the Control Unit (CU) in the CPU?',
 opts:['A. Stores data permanently','B. Performs arithmetic calculations','C. Fetches, decodes and controls execution of instructions','D. Connects the CPU to the internet'],
 ans:2, exp:'The Control Unit fetches instructions from memory, decodes them, and coordinates all CPU activities to ensure instructions are executed correctly.',
 wrong:{'A':'Permanent storage is the role of secondary storage devices like hard drives.','B':'Arithmetic is performed by the ALU, not the CU.','D':'Internet connectivity is handled by network cards, not the CU.'}
},
{id:5,topic:'Computer Hardware',source:'Littoral Mock 2025',
 q:'Which of the following is an example of an OUTPUT device?',
 opts:['A. Microphone','B. Keyboard','C. Scanner','D. Plotter'],
 ans:3, exp:'A plotter is an output device that produces precise line drawings. It is used in CAD/engineering applications.',
 wrong:{'A':'A microphone is an input device that captures sound.','B':'A keyboard is an input device.','C':'A scanner is an input device that converts physical documents to digital format.'}
},
{id:6,topic:'Computer Hardware',source:'SW Mock 2026',
 q:'What does MICR stand for?',
 opts:['A. Magnetic Ink Character Reader','B. Manual Input Character Recognition','C. Magnetic Internet Character Reader','D. Multi-Input Capture Reader'],
 ans:0, exp:'MICR stands for Magnetic Ink Character Recognition. It reads characters printed in special magnetic ink, commonly used on bank cheques.',
 wrong:{'B':'This is not a real technology term.','C':'MICR has no connection to the internet.','D':'This is not a real technology term.'}
},
{id:7,topic:'Computer Hardware',source:'GCE Past',
 q:'Which storage device is described as having the FASTEST access speed?',
 opts:['A. Hard Disk Drive (HDD)','B. Optical Disc','C. USB Flash Drive','D. Cache Memory'],
 ans:3, exp:'Cache memory is the fastest storage device. It sits between the CPU and RAM to store frequently accessed instructions and data, reducing access time significantly.',
 wrong:{'A':'HDDs are the slowest of the listed options due to mechanical read/write heads.','B':'Optical discs are even slower than HDDs for random access.','C':'Flash drives are faster than HDDs but much slower than cache.'}
},
{id:8,topic:'Computer Hardware',source:'HIHS Mock 2024',
 q:'The machine cycle consists of Fetch, Decode, and:',
 opts:['A. Store','B. Execute','C. Load','D. Write'],
 ans:1, exp:'The machine cycle (instruction cycle) consists of three stages: Fetch (get instruction from RAM), Decode (interpret instruction), and Execute (carry out the instruction).',
 wrong:{'A':'Store is part of some extended cycles but not the standard third step.','C':'Load is not the third step of the standard machine cycle.','D':'Write operations may occur during execution but are not the cycle step itself.'}
},
{id:9,topic:'Computer Hardware',source:'SW Mock 2026',
 q:'What type of data does the Data Bus carry?',
 opts:['A. Memory addresses','B. Control signals','C. Actual data between CPU and memory','D. Power signals'],
 ans:2, exp:'The Data Bus carries the actual data (instructions or values) between the CPU, memory, and other components. It is bidirectional.',
 wrong:{'A':'Memory addresses are carried by the Address Bus.','B':'Control signals are carried by the Control Bus.','D':'Power is supplied by the power supply unit, not a bus.'}
},
{id:10,topic:'Computer Hardware',source:'GCE Past',
 q:'Which of the following best describes ROM?',
 opts:['A. Volatile memory used to run programs','B. Non-volatile memory containing permanent instructions','C. Secondary storage for user files','D. Input device for reading data'],
 ans:1, exp:'ROM (Read-Only Memory) is non-volatile memory that permanently stores the BIOS/firmware. It cannot be modified by the user and retains data without power.',
 wrong:{'A':'Volatile memory used to run programs describes RAM.','C':'Secondary storage is provided by hard drives, SSDs, etc.','D':'ROM is not an input device.'}
},
{id:11,topic:'Computer Hardware',source:'HIHS Mock 2025',
 q:'An OMR device is BEST used for:',
 opts:['A. Reading bar codes on products','B. Capturing marks on multiple-choice answer sheets','C. Scanning fingerprints','D. Reading magnetic strips on bank cards'],
 ans:1, exp:'OMR (Optical Mark Recognition) reads marks made on specifically designed forms. It is commonly used for multiple-choice exam answer sheets and survey forms.',
 wrong:{'A':'Barcode reading is done by a barcode scanner, not OMR.','C':'Fingerprint scanning uses biometric sensors.','D':'Magnetic strip reading uses a magnetic card reader.'}
},
{id:12,topic:'Computer Hardware',source:'SW Mock 2026',
 q:'Which unit of memory is the LARGEST?',
 opts:['A. Kilobyte (KB)','B. Megabyte (MB)','C. Gigabyte (GB)','D. Terabyte (TB)'],
 ans:3, exp:'The order from smallest to largest is: Bit → Byte → KB → MB → GB → TB → PB. A Terabyte (TB) = 1024 GB, making it the largest in this list.',
 wrong:{'A':'Kilobyte = 1024 Bytes — the smallest in this list.','B':'Megabyte = 1024 KB.','C':'Gigabyte = 1024 MB — large but not the largest here.'}
},
// ─── INFORMATION SYSTEMS (20) ───────────────────────────────
{id:20,topic:'Information Systems',source:'HIHS Mock 2025',
 q:'Which type of information system is used at the OPERATIONAL level of management?',
 opts:['A. Executive Information System (EIS)','B. Decision Support System (DSS)','C. Transaction Processing System (TPS)','D. Management Information System (MIS)'],
 ans:2, exp:'The TPS (Transaction Processing System) is used at the operational level. It handles day-to-day transactions like payroll, order processing, and stock control.',
 wrong:{'A':'EIS is used at the strategic (top) management level.','B':'DSS is used at senior management level for semi-structured decisions.','D':'MIS is used at the middle management level.'}
},
{id:21,topic:'Information Systems',source:'SW Mock 2026',
 q:'An information system that helps executives analyse long-term trends is a(n):',
 opts:['A. TPS','B. MIS','C. DSS','D. EIS'],
 ans:3, exp:'EIS (Executive Information System) is at the top of the management pyramid. It helps senior executives analyse trends and plan long-term strategies using both internal and external data.',
 wrong:{'A':'TPS handles routine day-to-day transactions.','B':'MIS supports middle management with structured reporting.','C':'DSS supports semi-structured decisions with modelling and analysis.'}
},
{id:22,topic:'Information Systems',source:'GCE Past',
 q:'Which of the following BEST describes "data"?',
 opts:['A. Processed facts with meaning','B. Raw facts and figures','C. Instructions for the computer','D. A collection of programs'],
 ans:1, exp:'Data refers to raw, unprocessed facts and figures (e.g., numbers, characters) that have no meaning on their own until they are processed into information.',
 wrong:{'A':'Processed facts with meaning describes information, not data.','C':'Instructions for a computer describes software/programs.','D':'A collection of programs describes software, not data.'}
},
{id:23,topic:'Information Systems',source:'HIHS Mock 2024',
 q:'A school uses a system to track student attendance every morning. This is BEST described as a:',
 opts:['A. Decision Support System','B. Transaction Processing System','C. Executive Information System','D. Expert System'],
 ans:1, exp:'Attendance tracking is a routine, repetitive operation — this is a Transaction Processing System. TPS records daily operational data like attendance, sales, and payments.',
 wrong:{'A':'DSS is for semi-structured decision support, not routine data recording.','C':'EIS is for top-level strategic analysis.','D':'Expert systems simulate expert knowledge for specialised decisions.'}
},

// Topics map
const TOPICS = {
  'Mixed – All Topics': ALL_QUESTIONS,
  'Computer Hardware': ALL_QUESTIONS.filter(q=>q.topic==='Computer Hardware'),
  'Information Systems': ALL_QUESTIONS.filter(q=>q.topic==='Information Systems'),
  'SDLC & Project Management': ALL_QUESTIONS.filter(q=>q.topic==='SDLC & Project Management'),
  'Algorithms & Programming': ALL_QUESTIONS.filter(q=>q.topic==='Algorithms & Programming'),
  'Databases': ALL_QUESTIONS.filter(q=>q.topic==='Databases'),
  'Networks & Internet': ALL_QUESTIONS.filter(q=>q.topic==='Networks & Internet'),
  'Number Systems': ALL_QUESTIONS.filter(q=>q.topic==='Number Systems'),
  'Logic Gates': ALL_QUESTIONS.filter(q=>q.topic==='Logic Gates'),
  'Ethics & Legislation': ALL_QUESTIONS.filter(q=>q.topic==='Ethics & Legislation')
};

const TOPIC_ICONS = {
  'Mixed – All Topics':'🎯','Computer Hardware':'🖥️','Information Systems':'📊',
  'SDLC & Project Management':'🔄','Algorithms & Programming':'⌨️','Databases':'🗄️',
  'Networks & Internet':'🌐','Number Systems':'🔢','Logic Gates':'⚡','Ethics & Legislation':'⚖️'
};

// Render topics
function renderTopics(){
  document.getElementById('topicGrid').innerHTML = Object.entries(TOPICS).map(([name,qs])=>`
    <div class="topic-btn" onclick="selectTopic('${name}')">
      <span class="t-icon">${TOPIC_ICONS[name]||'📋'}</span>
      <div class="t-name">${name}</div>
      <div class="t-count">${qs.length} questions available</div>
    </div>
  `).join('');
}
renderTopics();

// Auto-load from session
const sessionTopic = sessionStorage.getItem('quizTopic');
if(sessionTopic){ selectTopic(sessionTopic); }

let currentTopic='', quizQuestions=[], currentIdx=0, score=0, userAnswers=[], timerInterval=null, timerSecs=45;

function selectTopic(topic){
  currentTopic = topic;
  document.getElementById('settingsTopicName').innerHTML = (TOPIC_ICONS[topic]||'📋')+' '+topic;
  document.getElementById('topicSelect').style.display='none';
  document.getElementById('quizSettings').style.display='block';
}

function shuffle(arr){ return arr.sort(()=>Math.random()-0.5); }

function launchQuiz(){
  const numQ = document.getElementById('numQuestionsSelect').value;
  const order = document.getElementById('orderSelect').value;
  timerSecs = parseInt(document.getElementById('timerSelect').value)||0;
  let pool = [...TOPICS[currentTopic]];
  if(order==='random') pool = shuffle(pool);
  quizQuestions = numQ==='all' ? pool : pool.slice(0, Math.min(parseInt(numQ),pool.length));
  currentIdx=0; score=0; userAnswers=[];
  document.getElementById('quizSettings').style.display='none';
  document.getElementById('quizRunner').style.display='block';
  document.getElementById('qTotal').textContent = quizQuestions.length;
  showQuestion();
}

function showQuestion(){
  if(currentIdx>=quizQuestions.length){ endQuiz(); return; }
  const q = quizQuestions[currentIdx];
  document.getElementById('qNum').textContent = currentIdx+1;
  document.getElementById('progressFill').style.width = ((currentIdx/quizQuestions.length)*100)+'%';
  document.getElementById('scoreLive').textContent = `Score: ${score} / ${currentIdx}`;

  const html = `
    <div class="question-card">
      <div class="q-meta">
        <span class="q-num">Q${currentIdx+1}</span>
        <span class="q-topic">${q.topic}</span>
        <span class="q-source">${q.source}</span>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="options-list">
        ${q.opts.map((opt,i)=>`
          <button class="option-btn" id="opt${i}" onclick="selectAnswer(${i})">
            <span class="option-letter">${String.fromCharCode(65+i)}</span>
            <span class="option-text">${opt.substring(2)}</span>
          </button>
        `).join('')}
      </div>
      <div class="feedback-box" id="feedbackBox"></div>
    </div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">
      ${currentIdx+1<quizQuestions.length ? 'Next Question →' : '🏁 Finish Quiz'}
    </button>
  `;
  document.getElementById('questionArea').innerHTML = html;
  window.scrollTo(0,0);

  if(timerSecs>0) startTimer();
}

let timerRemaining=0;
function startTimer(){
  clearInterval(timerInterval);
  timerRemaining = timerSecs;
  const badge = document.getElementById('timerBadge');
  badge.style.display='block';
  badge.textContent = '⏱ '+timerRemaining;
  badge.className='timer-badge';
  timerInterval = setInterval(()=>{
    timerRemaining--;
    badge.textContent='⏱ '+timerRemaining;
    if(timerRemaining<=10) badge.className='timer-badge warn';
    if(timerRemaining<=0){
      clearInterval(timerInterval);
      // Auto-skip: mark as skipped
      selectAnswer(-1);
    }
  },1000);
}

function selectAnswer(chosen){
  clearInterval(timerInterval);
  const q = quizQuestions[currentIdx];
  const isCorrect = chosen === q.ans;
  userAnswers.push({q, chosen, isCorrect});
  if(isCorrect) score++;

  // Disable all options
  q.opts.forEach((_,i)=>{
    const btn = document.getElementById('opt'+i);
    if(btn){ btn.disabled=true; }
  });

  // Highlight correct/wrong
  if(chosen>=0){
    const chosenBtn = document.getElementById('opt'+chosen);
    if(chosenBtn) chosenBtn.classList.add(isCorrect?'correct':'wrong');
  }
  const correctBtn = document.getElementById('opt'+q.ans);
  if(correctBtn && !isCorrect) correctBtn.classList.add('correct');

  // Show feedback
  const fb = document.getElementById('feedbackBox');
  if(fb){
    let wrongHtml='';
    if(!isCorrect && q.wrong){
      const chosenLetter = chosen>=0 ? String.fromCharCode(65+chosen) : 'X';
      const chosenText = q.wrong[chosenLetter];
      if(chosenText) wrongHtml = `<div class="wrong-others"><p>Why ${chosenLetter} is wrong:</p><ul><li>${chosenText}</li></ul></div>`;
    }
    fb.className = 'feedback-box '+(isCorrect?'correct-fb':'wrong-fb');
    fb.style.display='block';
    fb.innerHTML = `
      <div class="fb-title ${isCorrect?'c':'w'}">${isCorrect?'✅ Correct!':'❌ Incorrect'}</div>
      <div class="fb-exp"><strong>Explanation:</strong> ${q.exp}</div>
      ${wrongHtml}
    `;
  }

  // Show next button
  const nb = document.getElementById('nextBtn');
  if(nb) nb.style.display='block';
  window.scrollTo(0, document.getElementById('questionArea').offsetTop);
}

function nextQuestion(){
  currentIdx++;
  showQuestion();
}

function endQuiz(){
  clearInterval(timerInterval);
  document.getElementById('quizRunner').style.display='none';
  document.getElementById('quizResults').style.display='block';

  const pct = Math.round((score/quizQuestions.length)*100);
  const scoreEl = document.getElementById('resultScore');
  scoreEl.textContent = pct+'%';
  scoreEl.className = 'result-score '+(pct>=50?'pass':'fail');

  let grade='', msg='';
  if(pct>=80){ grade='Excellent! 🏆'; msg='Outstanding performance! You are well prepared.'; }
  else if(pct>=65){ grade='Good Pass 🎉'; msg='Good work! Review the questions you missed.'; }
  else if(pct>=50){ grade='Pass ✅'; msg='You passed. But review the topics where you struggled.'; }
  else { grade='Below Pass – Study More 📚'; msg='Keep studying. Focus on the topics you missed most.'; }

  document.getElementById('resultGrade').textContent = grade;
  document.getElementById('resultMsg').textContent = msg;
  document.getElementById('rCorrect').textContent = score;
  document.getElementById('rWrong').textContent = quizQuestions.length - score - userAnswers.filter(a=>a.chosen===-1).length;
  document.getElementById('rSkipped').textContent = userAnswers.filter(a=>a.chosen===-1).length;

  // Save to server (persistent) + localStorage (fallback)
  const resultObj = { cin:userCIN, name:userName, topic:currentTopic, score:pct, correct:score, total:quizQuestions.length, date:new Date().toISOString() };
  try {
    fetch('/api/quiz', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(resultObj)
    });
  } catch(e) {}
  // Also localStorage fallback
  const results = JSON.parse(localStorage.getItem('quizResults')||'[]');
  results.push(resultObj);
  localStorage.setItem('quizResults', JSON.stringify(results));

  // Review
  document.getElementById('reviewList').innerHTML = userAnswers.map((ua,i)=>`
    <div class="review-item ${ua.isCorrect?'ri-correct':'ri-wrong'}">
      <div class="ri-q"><strong>Q${i+1}:</strong> ${ua.q.q}</div>
      <div class="ri-answer"><span class="lbl">Your answer: </span>
        <span class="${ua.isCorrect?'val-correct':'val-wrong'}">${ua.chosen>=0?ua.q.opts[ua.chosen]:'Skipped (time out)'}</span>
      </div>
      ${!ua.isCorrect?`<div class="ri-answer"><span class="lbl">Correct answer: </span><span class="val-correct">${ua.q.opts[ua.q.ans]}</span></div>`:''}
      <div class="ri-exp">${ua.q.exp}</div>
    </div>
  `).join('');
  window.scrollTo(0,0);
}

function retryQuiz(){ document.getElementById('quizResults').style.display='none'; launchQuiz(); }
function showTopicSelect(){
  document.getElementById('quizResults').style.display='none';
  document.getElementById('topicSelect').style.display='block';
  sessionStorage.removeItem('quizTopic');
}
</script>
</body>
</html>
