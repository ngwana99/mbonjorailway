<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIHS 2024 Full Paper + Extra Bank – GHS Mbonjo CS</title>
<style>
* { -webkit-user-select:none; -moz-user-select:none; user-select:none; }
@media print { body { display:none !important; } }
input, textarea { -webkit-user-select:text; user-select:text; }
:root{--green:#006633;--gold:#FFD700;--dark:#1a1a2e;--card:#16213e;--accent:#0f3460;--text:#e0e0e0;--white:#fff;--red:#e74c3c;--blue:#3498db;--radius:12px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;}
.topbar{background:linear-gradient(135deg,var(--green),#004d26);border-bottom:3px solid var(--gold);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-title{font-size:15px;font-weight:700;color:var(--white);}
.topbar-title span{color:var(--gold);}
.back-btn{background:rgba(255,215,0,0.15);border:1px solid rgba(255,215,0,0.3);color:var(--gold);padding:7px 14px;border-radius:20px;font-size:13px;cursor:pointer;font-weight:600;}
.container{max-width:780px;margin:0 auto;padding:20px 16px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* TOPIC SELECT */
.page-title{font-size:22px;font-weight:800;color:var(--gold);margin-bottom:6px;}
.page-sub{font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:24px;}
.topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-bottom:24px;}
.topic-btn{background:var(--card);border:1px solid rgba(255,255,255,0.07);border-radius:var(--radius);padding:18px 16px;cursor:pointer;transition:all 0.3s;text-align:left;}
.topic-btn:hover{border-color:rgba(255,215,0,0.4);transform:translateY(-3px);box-shadow:0 6px 20px rgba(255,215,0,0.1);}
.topic-btn .t-icon{font-size:26px;margin-bottom:8px;display:block;}
.topic-btn .t-name{font-size:14px;font-weight:700;color:var(--white);margin-bottom:4px;}
.topic-btn .t-count{font-size:12px;color:rgba(255,255,255,0.4);}

/* SETTINGS */
#quizSettings{display:none;animation:fadeIn 0.4s ease;}
.settings-card{background:var(--card);border-radius:var(--radius);padding:24px;border:1px solid rgba(255,215,0,0.15);margin-bottom:20px;}
.settings-card h3{color:var(--gold);font-size:17px;margin-bottom:16px;}
.setting-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.setting-row label{font-size:14px;color:rgba(255,255,255,0.7);}
.setting-row select{background:#0f3460;border:1px solid rgba(255,215,0,0.2);color:var(--white);padding:8px 12px;border-radius:8px;font-size:13px;-webkit-user-select:auto;user-select:auto;}
.start-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--gold),#e6c200);color:#1a1a2e;border:none;border-radius:var(--radius);font-size:16px;font-weight:800;cursor:pointer;text-transform:uppercase;letter-spacing:1px;transition:all 0.3s;}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,215,0,0.4);}
.cancel-btn{width:100%;padding:13px;background:rgba(255,255,255,0.06);color:var(--text);border:1px solid rgba(255,255,255,0.1);border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;margin-top:10px;}

/* RUNNER */
#quizRunner{display:none;animation:fadeIn 0.4s ease;}
.quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.progress-info{font-size:13px;color:rgba(255,255,255,0.6);}
.progress-info span{color:var(--gold);font-weight:700;}
.timer-badge{background:rgba(255,165,0,0.15);border:1px solid rgba(255,165,0,0.3);color:orange;padding:6px 14px;border-radius:20px;font-size:14px;font-weight:700;min-width:70px;text-align:center;}
.timer-badge.warn{background:rgba(231,76,60,0.2);border-color:rgba(231,76,60,0.4);color:#ff6b6b;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
.progress-bar{height:6px;background:rgba(255,255,255,0.08);border-radius:3px;margin-bottom:16px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--gold));border-radius:3px;transition:width 0.5s ease;}
.score-live{font-size:12px;color:rgba(255,255,255,0.4);text-align:right;margin-bottom:14px;}
.question-card{background:var(--card);border-radius:var(--radius);padding:22px;border:1px solid rgba(255,255,255,0.07);margin-bottom:14px;box-shadow:0 4px 20px rgba(0,0,0,0.3);}
.q-meta{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.q-num{background:rgba(255,215,0,0.15);color:var(--gold);padding:4px 10px;border-radius:10px;font-size:12px;font-weight:700;}
.q-topic{background:rgba(52,152,219,0.1);color:var(--blue);border:1px solid rgba(52,152,219,0.2);padding:3px 10px;border-radius:10px;font-size:11px;}
.q-source{font-size:11px;color:rgba(255,255,255,0.3);}
.q-text{font-size:15px;color:var(--white);line-height:1.7;margin-bottom:18px;}
.options-list{display:flex;flex-direction:column;gap:10px;}
.option-btn{display:flex;align-items:center;gap:12px;padding:13px 15px;background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.09);border-radius:10px;cursor:pointer;transition:all 0.2s;text-align:left;width:100%;}
.option-btn:hover:not(:disabled){background:rgba(255,215,0,0.08);border-color:rgba(255,215,0,0.3);}
.option-btn:disabled{cursor:default;}
.option-letter{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.option-text{font-size:14px;color:rgba(255,255,255,0.85);flex:1;line-height:1.4;}
.option-btn.correct{background:rgba(0,200,80,0.12);border-color:rgba(0,200,80,0.5);}
.option-btn.correct .option-letter{background:rgba(0,200,80,0.3);color:#2ecc71;}
.option-btn.wrong{background:rgba(231,76,60,0.12);border-color:rgba(231,76,60,0.5);}
.option-btn.wrong .option-letter{background:rgba(231,76,60,0.3);color:#ff6b6b;}
.feedback-box{margin-top:14px;border-radius:10px;padding:14px;display:none;animation:fadeIn 0.3s ease;}
.feedback-box.correct-fb{background:rgba(0,200,80,0.1);border:1px solid rgba(0,200,80,0.3);}
.feedback-box.wrong-fb{background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,0.3);}
.fb-title{font-size:14px;font-weight:700;margin-bottom:6px;}
.fb-title.c{color:#2ecc71;}.fb-title.w{color:#ff6b6b;}
.fb-exp{font-size:13px;color:rgba(255,255,255,0.75);line-height:1.6;}
.next-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),#e6c200);color:#1a1a2e;border:none;border-radius:10px;font-size:15px;font-weight:800;cursor:pointer;margin-top:12px;display:none;transition:all 0.3s;}
.next-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,215,0,0.4);}

/* RESULTS */
#quizResults{display:none;animation:fadeIn 0.5s ease;}
.result-card{background:var(--card);border-radius:20px;padding:28px 24px;text-align:center;border:2px solid var(--gold);box-shadow:0 0 40px rgba(255,215,0,0.15);margin-bottom:20px;}
.result-score{font-size:64px;font-weight:900;margin-bottom:6px;}
.result-score.pass{color:#2ecc71;}.result-score.fail{color:#e74c3c;}
.result-grade{font-size:20px;font-weight:700;color:var(--gold);margin-bottom:14px;}
.result-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:16px 0;}
.r-stat{background:rgba(255,255,255,0.05);border-radius:10px;padding:12px 8px;text-align:center;}
.r-stat .rn{font-size:24px;font-weight:800;color:var(--gold);}
.r-stat .rl{font-size:10px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.8px;}
.rbtn{width:100%;padding:14px;border:none;border-radius:var(--radius);font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;margin-bottom:8px;}
.rbtn:hover{transform:translateY(-2px);}
.rbtn-retry{background:linear-gradient(135deg,var(--gold),#e6c200);color:#1a1a2e;}
.rbtn-home{background:rgba(255,255,255,0.07);color:var(--text);border:1px solid rgba(255,255,255,0.1);}
.review-section{margin-top:18px;}
.review-section h3{font-size:17px;color:var(--gold);margin-bottom:12px;font-weight:800;}
.review-item{background:var(--card);border-radius:10px;padding:14px 16px;margin-bottom:10px;border-left:4px solid #2ecc71;}
.review-item.ri-wrong{border-left-color:#e74c3c;}
.ri-q{font-size:13px;color:rgba(255,255,255,0.85);margin-bottom:8px;line-height:1.5;}
.ri-ans{font-size:12px;margin-bottom:3px;}
.ri-exp-text{font-size:12px;color:rgba(255,255,255,0.45);margin-top:6px;font-style:italic;line-height:1.5;}
@media(max-width:480px){.container{padding:12px;}.q-text{font-size:14px;}.option-text{font-size:13px;}.result-score{font-size:48px;}}
</style>
</head>
<body>
<div class="topbar">
  <button class="back-btn" onclick="window.location.href='part2_platform.html'">← Back</button>
  <div class="topbar-title">CS e-Learning &nbsp;·&nbsp; <span>HIHS 2024 Paper + Extra Bank</span></div>
  <div style="font-size:12px;color:var(--gold);font-weight:700" id="topBadge"></div>
</div>
<div class="container">

<!-- TOPIC SELECT -->
<div id="topicSelect" style="animation:fadeIn 0.4s ease">
  <div class="page-title">📜 HIHS 2024 Full Paper & Extra Questions</div>
  <div class="page-sub">Complete 50-question HIHS 2024 Paper 1 with answers, plus additional topic banks.</div>
  <div class="topic-grid" id="topicGrid"></div>
</div>

<!-- SETTINGS -->
<div id="quizSettings">
  <div class="settings-card">
    <h3 id="settingsTitle">Quiz Settings</h3>
    <div class="setting-row">
      <label>Number of Questions</label>
      <select id="numQ"><option value="15">15 Questions</option><option value="25" selected>25 Questions</option><option value="50">All Questions</option></select>
    </div>
    <div class="setting-row">
      <label>Timer per question</label>
      <select id="timerQ"><option value="0">No Timer</option><option value="45" selected>45 Seconds</option><option value="60">60 Seconds</option></select>
    </div>
    <div class="setting-row">
      <label>Order</label>
      <select id="orderQ"><option value="random" selected>Random</option><option value="seq">Sequential</option></select>
    </div>
  </div>
  <button class="start-btn" onclick="launchQuiz()">🚀 Start Quiz</button>
  <button class="cancel-btn" onclick="backToTopics()">← Choose Different Topic</button>
</div>

<!-- RUNNER -->
<div id="quizRunner">
  <div class="quiz-header">
    <div class="progress-info">Question <span id="qNum">1</span> of <span id="qTotal">25</span></div>
    <div class="timer-badge" id="timerBadge" style="display:none">⏱ 45</div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="pFill" style="width:0%"></div></div>
  <div class="score-live" id="scoreLive">Score: 0 / 0</div>
  <div id="qArea"></div>
</div>

<!-- RESULTS -->
<div id="quizResults">
  <div class="result-card">
    <div class="result-score" id="rScore">0%</div>
    <div class="result-grade" id="rGrade"></div>
    <div style="font-size:13px;color:rgba(255,255,255,0.6);margin-bottom:14px" id="rMsg"></div>
    <div class="result-stats">
      <div class="r-stat"><div class="rn" id="rC">0</div><div class="rl">Correct</div></div>
      <div class="r-stat"><div class="rn" id="rW">0</div><div class="rl">Wrong</div></div>
      <div class="r-stat"><div class="rn" id="rS">0</div><div class="rl">Skipped</div></div>
    </div>
    <button class="rbtn rbtn-retry" onclick="retryQ()">🔄 Retry</button>
    <button class="rbtn rbtn-home" onclick="backToTopics()">🏠 Choose Topic</button>
  </div>
  <div class="review-section">
    <h3>📋 Review Answers</h3>
    <div id="reviewList"></div>
  </div>
</div>

</div>
<script>
document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&['c','p','s','u'].includes(e.key.toLowerCase()))e.preventDefault();if(e.key==='F12')e.preventDefault();});
const userCIN=sessionStorage.getItem('userCIN'),userName=sessionStorage.getItem('userName');
if(!userCIN){window.location.href='index.html';}
document.getElementById('topBadge').textContent='👤 '+(userName||'').split(' ')[0];

// ═══════════════════════════════════════
// COMPLETE HIHS 2024 PAPER 1 — 50 Qs
// ═══════════════════════════════════════
const HIHS2024 = [
  {topic:'Computer Hardware',source:'HIHS 2024 Q1',q:'Before a program is run, it must be loaded in the:',opts:['ROM','Hard disk','RAM','Virtual Memory'],ans:2,exp:'A program must be loaded into RAM (Random Access Memory) before execution. The CPU can only directly access data in RAM, not from secondary storage.'},
  {topic:'Networks',source:'HIHS 2024 Q2',q:'Data can be transmitted between two devices simultaneously in both directions. This mode is called:',opts:['Half duplex','Simplex','Full duplex','Multiplex'],ans:2,exp:'Full duplex allows simultaneous two-way transmission — both devices send and receive at the same time. Like a telephone call.'},
  {topic:'Ethics',source:'HIHS 2024 Q3',q:'One way to prevent unauthorized use of files in a computer network is to:',opts:['Decrypt files','Encrypt files','Use spyware','Spam filter'],ans:1,exp:'Encryption converts data into a coded form that cannot be read without the decryption key, preventing unauthorized access.'},
  {topic:'Software',source:'HIHS 2024 Q4',q:'The process that checks hardware functionality and loads the OS onto RAM is called:',opts:['Booting','Input','Processing','Storage'],ans:0,exp:'Booting is the process of starting a computer — POST (Power-On Self-Test) checks hardware, then the BIOS loads the OS into RAM.'},
  {topic:'Software',source:'HIHS 2024 Q5',q:'Android is a(n):',opts:['Operating system','A generation of young people','Application software','Type of Smartphone'],ans:0,exp:'Android is a mobile operating system developed by Google, based on Linux. It manages hardware and provides a platform for apps.'},
  {topic:'Ethics',source:'HIHS 2024 Q6',q:'Which security measure directly addresses privacy of health records?',opts:['Installing anti-virus in health systems','Collecting only necessary information about people','Making frequent backups','Using a firewall'],ans:1,exp:'Collecting only necessary data (data minimisation) directly protects privacy. This is a core principle of the Data Protection Act.'},
  {topic:'Computer Hardware',source:'HIHS 2024 Q7',q:'The part of the CPU that HOLDS data currently being processed is the:',opts:['Control unit','Arithmetic unit','Logic unit','Register'],ans:3,exp:'Registers are tiny, ultra-fast storage locations inside the CPU that hold data being actively processed — operands, intermediate results, and instructions.'},
  {topic:'SDLC',source:'HIHS 2024 Q8',q:'In SDLC, pilot conversion means running:',opts:['New system alongside old system','New system with selected users alongside old system','Parts of old with parts of new','New system while old one is shut down'],ans:1,exp:'Pilot conversion deploys the new system to a small, selected group of users first while others continue on the old system. If successful, full rollout follows.'},
  {topic:'Networks',source:'HIHS 2024 Q9',q:'The abbreviation URL stands for:',opts:['Unified Resourced Location','Uniform Resource Location','Uniform Resource Locator','Unified Resource Locator'],ans:2,exp:'URL = Uniform Resource Locator. It is the complete address used to locate a resource on the internet (e.g., https://www.google.com).'},
  {topic:'Networks',source:'HIHS 2024 Q10',q:'The maximum rate of data transmission per unit time along a communication channel is called:',opts:['Gigahertz','Gigabyte','Broadband','Bandwidth'],ans:3,exp:'Bandwidth is the maximum data transfer rate of a network or internet connection, measured in bits per second (bps, Mbps, Gbps).'},
  {topic:'Programming',source:'HIHS 2024 Q11',q:'Pseudocode is used for:',opts:['Denoting program flow','Writing actual programs','Creating flowcharts','Writing steps of an algorithm'],ans:3,exp:'Pseudocode is used to describe the steps of an algorithm in simple, structured English before coding. It is language-independent.'},
  {topic:'Networks',source:'HIHS 2024 Q12',q:'Software commonly used to open and view web pages is called a:',opts:['Search engine','Homepage','Browser','URL'],ans:2,exp:'A web browser (e.g., Chrome, Firefox, Safari) is software for accessing and displaying web pages. A search engine is a website within a browser.'},
  {topic:'Logic Gates',source:'HIHS 2024 Q13',q:'A NOR gate outputs logic HIGH (1) when:',opts:['All inputs are high','All inputs are low','One input is high, others low','One input is low, others high'],ans:1,exp:'NOR = NOT OR. It outputs 1 ONLY when ALL inputs are 0 (low). Any 1 input produces 0 output.'},
  {topic:'Ethics',source:'HIHS 2024 Q14',q:'PIN code means:',opts:['Personal Identification Number code','Personal Identity Number code','Private Identification Number code','Private Identity Number code'],ans:0,exp:'PIN = Personal Identification Number. The word "code" after PIN is redundant (PIN already includes "Number") but A is the correct expansion.'},
  {topic:'Networks',source:'HIHS 2024 Q15',q:'The HTML tags <ol>…</ol> generate a:',opts:['Unordered list','Numbered list','Bulleted list','Odd numbered list'],ans:1,exp:'<ol> creates an Ordered List — a numbered list. <ul> creates an Unordered List — a bulleted list.'},
  {topic:'Computer Hardware',source:'HIHS 2024 Q16',q:'Vacuum tubes were used in which generation(s) of computers?',opts:['First and second','First','Second','Second and third'],ans:1,exp:'Vacuum tubes were used ONLY in the 1st generation (1940s-1950s). The 2nd generation replaced them with transistors.'},
  {topic:'SDLC',source:'HIHS 2024 Q17',q:'The full meaning of SDLC is:',opts:['System Design Life Cycle','Software Design Life Cycle','System Development Life Cycle','Software Development Life Cycle'],ans:2,exp:'SDLC = System Development Life Cycle. It is the structured process for planning, creating, testing, and deploying an information system.'},
  {topic:'Databases',source:'HIHS 2024 Q18',q:'In databases, a field of type INTEGER can:',opts:['Also accept a real number','Accept any alphanumeric character','Accept only whole numbers','Also accept a currency symbol'],ans:2,exp:'An Integer field accepts ONLY whole numbers (no decimals, no text, no symbols). For decimals use Real/Float. For text use String/Text.'},
  {topic:'Networks',source:'HIHS 2024 Q19',q:'Sending a file FROM your computer TO a server is called:',opts:['Downloading','Reading','Writing','Uploading'],ans:3,exp:'Uploading sends data FROM your device TO a server or the internet. Downloading is the reverse — from server to your device.'},
  {topic:'Software',source:'HIHS 2024 Q20',q:'Software that manages hardware and other installed software is called:',opts:['Device driver','Application software','Operating system','Utility software'],ans:2,exp:'The Operating System (OS) is the master software that manages all hardware resources and provides a platform for applications.'},
  {topic:'Computer Hardware',source:'HIHS 2024 Q21',q:'A 2GHz dual-core CPU — which statement is TRUE?',opts:['It operates 2 cycles per second','It operates at about 4GHz','It processes 2GB of data per second','It operates 4 cycles per second'],ans:1,exp:'A dual-core 2GHz CPU has two cores each running at 2GHz, effectively providing ~4GHz combined throughput for parallel tasks.'},
  {topic:'Programming',source:'HIHS 2024 Q22',q:'Which program is used for LOCATING and CORRECTING programming errors?',opts:['Compiler','Assembler','Debugger','Linker'],ans:2,exp:'A Debugger is a tool that helps programmers find and fix errors (bugs) in code. It can step through code line by line and inspect variable values.'},
  {topic:'Software',source:'HIHS 2024 Q23',q:'Which is an example of a PICTURE file format?',opts:['Tiff','Wav','Mp3','Html'],ans:0,exp:'TIFF (Tagged Image File Format) is an image/picture format. WAV and MP3 are audio formats. HTML is a web page format.'},
  {topic:'Networks',source:'HIHS 2024 Q24',q:'In networking, MODEM stands for:',opts:['Modular and Demodulator','Modular and Demodulator','Modulation and Demodulation','Moderation and Demodulation'],ans:2,exp:'MODEM = MOdulator-DEModulator. It converts digital signals to analog (modulation) for transmission and back to digital (demodulation) on receipt.'},
  {topic:'Software',source:'HIHS 2024 Q25',q:'Which software is MOST suitable for computer simulation?',opts:['Desktop publishing software','Spreadsheet','Word processor','Database management software'],ans:1,exp:'Spreadsheets (like Excel) are used for simulation via What-If Analysis, Goal Seek, and Data Tables — allowing modelling of different scenarios.'},
  {topic:'Software',source:'HIHS 2024 Q26',q:'A file compression software is an example of:',opts:['Application software','Operating system','Utility software','Presentation software'],ans:2,exp:'File compression tools (e.g., WinZip, 7-Zip) are utility software — programs that perform maintenance and optimization tasks for the system.'},
  {topic:'Software',source:'HIHS 2024 Q27',q:'The spreadsheet cell range A2:C6 has how many cells?',opts:['4','8','15','3'],ans:2,exp:'A2:C6 = columns A,B,C (3 columns) × rows 2,3,4,5,6 (5 rows) = 3×5 = 15 cells.'},
  {topic:'Computer Hardware',source:'HIHS 2024 Q28',q:'CPU speed can be expressed in:',opts:['Microseconds','Megahertz','Megabyte','Megawatt'],ans:1,exp:'CPU clock speed is measured in Hertz (Hz), typically Megahertz (MHz) or Gigahertz (GHz). Megabytes measure storage; Megawatts measure power.'},
  {topic:'Databases',source:'HIHS 2024 Q29',q:'In a database table, a field used to UNIQUELY identify a record is called a:',opts:['Key field','Secondary field','Foreign key','Optional key field'],ans:0,exp:'A key field (Primary Key) uniquely identifies each record. No two records can share the same primary key value.'},
  {topic:'Number Systems',source:'HIHS 2024 Q30',q:'The number 56A3 is written possibly in base:',opts:['16','7','8','9'],ans:0,exp:'56A3 contains the digit "A" which has value 10. Only hexadecimal (base 16) uses letters A–F as digits. Bases 7, 8, and 9 only use 0–6, 0–7, and 0–8.'},
  {topic:'Software',source:'HIHS 2024 Q31',q:'An open source software is one that:',opts:['Has no license','Can be modified and distributed freely','Is downloaded from the internet','Is not protected from viruses'],ans:1,exp:'Open-source software has a licence that permits users to freely view, modify, and distribute the source code.'},
  {topic:'Computer Hardware',source:'HIHS 2024 Q32',q:'Which enables a computer to handle programs requiring MORE memory than available RAM?',opts:['Virtual Memory','Cache memory','ROM','Register'],ans:0,exp:'Virtual Memory uses a portion of the hard disk as an extension of RAM, allowing computers to run programs larger than physical RAM.'},
  {topic:'Number Systems',source:'HIHS 2024 Q33',q:'In the hexadecimal number system there are _______ distinct symbols:',opts:['10','15','16','12'],ans:2,exp:'Hexadecimal (base 16) uses 16 distinct symbols: 0–9 and A–F (where A=10, B=11, C=12, D=13, E=14, F=15).'},
  {topic:'Networks',source:'HIHS 2024 Q34',q:'For signals to travel long distances, their strength needs to be boosted by a:',opts:['Modem','Repeater','Router','Multiplexer'],ans:1,exp:'A Repeater regenerates and amplifies weakening signals so they can travel longer distances without data loss.'},
  {topic:'Number Systems',source:'HIHS 2024 Q35',q:'The hexadecimal number 2E in binary is:',opts:['101110','110110','101100','111100'],ans:0,exp:'2₁₆=0010, E₁₆=1110. Combining: 00101110. Without leading zeros: 101110₂. Check: 32+8+4+2=46; 2E₁₆=2×16+14=46 ✓'},
  {topic:'Databases',source:'HIHS 2024 Q36',q:'A relational database comprises a collection of:',opts:['Relations','Records','Folders','Tables'],ans:3,exp:'A relational database organises data into Tables (also called relations). Tables contain rows (records) and columns (fields/attributes).'},
  {topic:'Computer Hardware',source:'HIHS 2024 Q37',q:'The Central Processing Unit (CPU) consists of:',opts:['RAM and Registers','Control Unit and ALU','ALU and RAM','Cache and RAM'],ans:1,exp:'The CPU contains the Control Unit (CU) — which fetches and decodes instructions — and the ALU — which executes them. RAM and Cache are separate.'},
  {topic:'SDLC',source:'HIHS 2024 Q38',q:'______ refers to the goals, objectives, and expectations of a project:',opts:['Project scope','Project design','Project analysis','Project review'],ans:0,exp:'Project scope defines what a project will and will not include — its goals, deliverables, tasks, deadlines, and boundaries.'},
  {topic:'Ethics',source:'HIHS 2024 Q39',q:'Carpal tunnel syndrome is basically related to:',opts:['Prolonged use of computer monitor','Prolonged use of computer keyboard','Poor computer chair placement','Poor monitor location'],ans:1,exp:'Carpal tunnel syndrome is caused by prolonged repetitive wrist movements — particularly from extended keyboard and mouse use.'},
  {topic:'Computer Hardware',source:'HIHS 2024 Q40',q:'______ is an input device capable of capturing hardcopy data into a computer system:',opts:['Keyboard','CD-ROM drive','Flash memory stick','Scanner'],ans:3,exp:'A scanner captures physical (hardcopy) documents and converts them to digital (softcopy) format. A keyboard enters text directly.'},
  {topic:'SDLC',source:'HIHS 2024 Q41',q:'Planning, scheduling, and controlling SDLC activities is known as:',opts:['Project design','Project analysis','Project management','Project feasibility study'],ans:2,exp:'Project management encompasses all activities of planning, scheduling, budgeting, and controlling tasks to complete a project on time and within budget.'},
  {topic:'Networks',source:'HIHS 2024 Q42',q:'SIM stands for:',opts:['Software Identity Module card','Simulation Identity Module card','Single Inline Module card','Subscriber Identity Module'],ans:3,exp:'SIM = Subscriber Identity Module. It is a small card in mobile phones storing the user\'s identity, phone number, and network authentication data.'},
  {topic:'Programming',source:'HIHS 2024 Q43',q:'In computer programming, the term VARIABLE means:',opts:['Memory location whose value can change','Data that changes','Some arbitrary number','A data structure'],ans:0,exp:'A variable is a named memory location that stores a value which CAN CHANGE during program execution (unlike a constant).'},
  {topic:'Number Systems',source:'HIHS 2024 Q44',q:'The OCTAL equivalent of binary 11010110 is:',opts:['234','326','624','462'],ans:1,exp:'Group binary in 3s from right: 11 010 110 → 011 010 110 → 3 2 6 → 326₈. Check: 3×64+2×8+6=192+16+6=214; 11010110₂=214₁₀=326₈ ✓'},
  {topic:'Software',source:'HIHS 2024 Q45',q:'The acronym MP3 stands for:',opts:['Motion Picture Expert Group Audio Layer 3','Motion Picture Audio Layer 3','Motion Picture Layer 3','Motion Picture Expert Group Audio Level 3'],ans:0,exp:'MP3 = MPEG-1 Audio Layer III (Motion Picture Expert Group). It is a compressed audio file format that reduces file size while maintaining quality.'},
  {topic:'Networks',source:'HIHS 2024 Q46',q:'The abbreviation MMS stands for:',opts:['Multiple Media Search','Multimedia Management Search','Multimedia Messaging Service','Multiple Media Service'],ans:2,exp:'MMS = Multimedia Messaging Service. It allows sending messages containing multimedia content (images, videos, audio) via mobile phones.'},
  {topic:'Ethics',source:'HIHS 2024 Q47',q:'Which is an example of invasion of privacy?',opts:['A hacker breaks into a system and steals records','A doctor tells friends the health status of a patient','A student copies a project from the web without crediting','A friend steals an ATM card and PIN and withdraws money'],ans:1,exp:'A doctor sharing a patient\'s confidential health information with friends violates patient privacy — confidentiality is a core medical ethics principle.'},
  {topic:'Computer Hardware',source:'HIHS 2024 Q48',q:'Which is a PRIMARY storage device?',opts:['RAM','ROM','USB stick','Hard disk'],ans:0,exp:'Primary storage is directly accessible by the CPU. RAM is primary storage. USB sticks and hard disks are secondary storage.'},
  {topic:'Computer Hardware',source:'HIHS 2024 Q49',q:'______ is a circuit board that enables a computer to output AUDIO files:',opts:['Graphic card','Sound card','Memory card drive','Flash drive'],ans:1,exp:'A Sound Card (audio card) processes and outputs audio signals to speakers. A Graphics Card handles video output.'},
  {topic:'Computer Hardware',source:'HIHS 2024 Q50',q:'______ is an example of a SOLID STATE storage device:',opts:['Diskette drive','CD-ROM drive','Hard disk drive','USB flash drive'],ans:3,exp:'A USB flash drive is solid-state — it uses flash memory chips with no moving parts. HDDs, diskettes, and CD-ROMs use mechanical or optical components.'},
];

// ═══════════════════════════════════════
// EXTRA TOPIC BANK (additional questions)
// ═══════════════════════════════════════
const EXTRA_BANK = [
  // Software & OS
  {topic:'Software',source:'Extra Bank',q:'Which type of software licence allows users to try before buying?',opts:['Freeware','Shareware','Open-source','Public domain'],ans:1,exp:'Shareware is software distributed freely for a trial period. After the trial, you must pay to continue using it.'},
  {topic:'Software',source:'Extra Bank',q:'Which is NOT a function of an Operating System?',opts:['Memory management','Process management','Designing web pages','Hardware management'],ans:2,exp:'Designing web pages is done by web developers using HTML/CSS, not by an OS. The OS manages memory, processes, files, and hardware.'},
  {topic:'Software',source:'Extra Bank',q:'A GUI (Graphical User Interface) uses:',opts:['Text commands only','Icons, menus, and windows','Binary code','Assembly language'],ans:1,exp:'A GUI uses visual elements — icons, menus, windows, and pointers — making computers accessible to non-technical users. Opposite of CLI (Command Line Interface).'},
  {topic:'Software',source:'Extra Bank',q:'Which software type CANNOT be modified or redistributed?',opts:['Open-source','Freeware','Proprietary/commercial','Public domain'],ans:2,exp:'Proprietary (commercial) software is owned by a company. The source code is secret and users cannot modify or redistribute it. Examples: Microsoft Office, Adobe Photoshop.'},
  // Spreadsheets
  {topic:'Software',source:'Extra Bank',q:'In Excel, the formula =SUM(A1:A5) adds:',opts:['Only cells A1 and A5','Cells A1, A2, A3, A4, and A5','All cells in column A','Cell A times 5'],ans:1,exp:'=SUM(A1:A5) adds all cells from A1 to A5 inclusive — that is 5 cells: A1+A2+A3+A4+A5.'},
  {topic:'Software',source:'Extra Bank',q:'What does the AVERAGE function do in a spreadsheet?',opts:['Finds the highest value','Finds the lowest value','Calculates the mean of selected values','Counts the number of cells'],ans:2,exp:'AVERAGE calculates the arithmetic mean — sum of all values divided by count. =AVERAGE(A1:A5) gives the mean of those 5 cells.'},
  // Word Processing
  {topic:'Software',source:'Extra Bank',q:'The feature that automatically corrects common spelling mistakes as you type is called:',opts:['Spell Check','Auto-Correct','Grammar Check','Thesaurus'],ans:1,exp:'Auto-Correct automatically fixes common typing errors as they are made (e.g., "teh" → "the"). Spell Check reviews the whole document after typing.'},
  {topic:'Software',source:'Extra Bank',q:'Which file extension is associated with Microsoft Word documents?',opts:['.xls','.ppt','.docx','.pdf'],ans:2,exp:'.docx is the default file extension for Microsoft Word documents (from Word 2007 onwards). .xls=Excel, .ppt=PowerPoint, .pdf=portable document.'},
  // HTML extra
  {topic:'Networks',source:'Extra Bank',q:'In HTML, which tag makes text appear in BOLD?',opts:['<i>','<u>','<b>','<em>'],ans:2,exp:'<b> or <strong> makes text bold. <i> or <em> makes text italic. <u> makes text underlined.'},
  {topic:'Networks',source:'Extra Bank',q:'What does the HTML attribute "href" specify?',opts:['The heading level','The destination URL of a hyperlink','The image source','The background colour'],ans:1,exp:'href (Hypertext Reference) in the <a> tag specifies the URL that the hyperlink points to. Example: <a href="https://example.com">Click</a>'},
  // Number Systems extra
  {topic:'Number Systems',source:'Extra Bank',q:'What is 255 in binary (8 bits)?',opts:['11111110','11111111','11110000','10101010'],ans:1,exp:'255 = 128+64+32+16+8+4+2+1 = all 8 bits set to 1 = 11111111₂. This is the maximum value for an unsigned 8-bit number.'},
  {topic:'Number Systems',source:'Extra Bank',q:'Binary 0000 0000 to 1111 1111 represents how many values?',opts:['128','255','256','512'],ans:2,exp:'8 bits can represent 2⁸ = 256 different values (0 through 255). The range is 0 to 255 inclusive.'},
  {topic:'Number Systems',source:'Extra Bank',q:'Convert octal 17 to decimal:',opts:['15','16','17','15'],ans:0,exp:'17₈ = (1×8) + (7×1) = 8 + 7 = 15₁₀.'},
  // Logic Gates extra  
  {topic:'Logic Gates',source:'Extra Bank',q:'How many rows does a truth table for 3 inputs have?',opts:['3','6','8','16'],ans:2,exp:'A truth table for n inputs has 2ⁿ rows. For 3 inputs: 2³ = 8 rows (covering all combinations of 0s and 1s).'},
  {topic:'Logic Gates',source:'Extra Bank',q:'Which gate is called a UNIVERSAL gate because any other gate can be built from it?',opts:['AND','OR','NOT','NAND'],ans:3,exp:'NAND and NOR are both universal gates — any other logic gate (AND, OR, NOT, XOR) can be constructed using only NAND gates.'},
  // Databases extra
  {topic:'Databases',source:'Extra Bank',q:'Which SQL command retrieves data from a database table?',opts:['INSERT','UPDATE','SELECT','DELETE'],ans:2,exp:'SELECT retrieves data. INSERT adds new records. UPDATE modifies existing records. DELETE removes records.'},
  {topic:'Databases',source:'Extra Bank',q:'Which normal form eliminates partial dependencies?',opts:['1NF','2NF','3NF','4NF'],ans:1,exp:'2NF eliminates partial dependencies — every non-key attribute must depend on the WHOLE primary key, not just part of it.'},
  // Project Management
  {topic:'SDLC',source:'Extra Bank',q:'In a PERT chart, SLACK TIME means:',opts:['Total project duration','Time between tasks','How long a task can be delayed without delaying the project','The number of resources needed'],ans:2,exp:'Slack (float) is the amount of time a task can be delayed without pushing back the project completion date. Critical path tasks have zero slack.'},
  {topic:'SDLC',source:'Extra Bank',q:'Which SDLC phase produces the REQUIREMENTS SPECIFICATION document?',opts:['Planning','Analysis','Design','Testing'],ans:1,exp:'The Analysis phase produces the requirements specification — a detailed document describing what the new system must do.'},
  // Monitoring/Control
  {topic:'Information Systems',source:'Extra Bank',q:'In a control system, an ACTUATOR:',opts:['Measures physical quantities','Stores system data','Converts electrical signals into physical action','Displays results on screen'],ans:2,exp:'An actuator receives electrical output from the processor and converts it into a physical action — e.g., turning a motor, opening a valve, triggering an alarm.'},
  {topic:'Information Systems',source:'Extra Bank',q:'A SENSOR in a monitoring/control system:',opts:['Makes decisions','Measures and converts physical quantities to electrical signals','Stores processed data','Displays output to users'],ans:1,exp:'A sensor detects physical quantities (temperature, pressure, motion) and converts them into electrical signals that the computer can process.'},
];

const ALL_TOPICS = {
  'HIHS 2024 – Complete Paper 1': HIHS2024,
  'All Extra Questions': EXTRA_BANK,
  'Combined (HIHS 2024 + Extra)': [...HIHS2024, ...EXTRA_BANK],
  'Software & Applications': [...HIHS2024,...EXTRA_BANK].filter(q=>q.topic==='Software'),
  'Computer Hardware': HIHS2024.filter(q=>q.topic==='Computer Hardware'),
  'Networks & Internet': [...HIHS2024,...EXTRA_BANK].filter(q=>q.topic==='Networks'),
  'Algorithms & Programming': HIHS2024.filter(q=>q.topic==='Programming'),
  'Number Systems': [...HIHS2024,...EXTRA_BANK].filter(q=>q.topic==='Number Systems'),
  'Logic Gates': [...HIHS2024,...EXTRA_BANK].filter(q=>q.topic==='Logic Gates'),
  'Databases': [...HIHS2024,...EXTRA_BANK].filter(q=>q.topic==='Databases'),
};
const TOPIC_ICONS2={'HIHS 2024 – Complete Paper 1':'📜','All Extra Questions':'➕','Combined (HIHS 2024 + Extra)':'🎯','Software & Applications':'💿','Computer Hardware':'🖥️','Networks & Internet':'🌐','Algorithms & Programming':'⌨️','Number Systems':'🔢','Logic Gates':'⚡','Databases':'🗄️'};

function renderTopics(){
  document.getElementById('topicGrid').innerHTML=Object.entries(ALL_TOPICS).map(([n,qs])=>`
    <div class="topic-btn" onclick="selectTopic('${n.replace(/'/g,"\\'")}')">
      <span class="t-icon">${TOPIC_ICONS2[n]||'📋'}</span>
      <div class="t-name">${n}</div>
      <div class="t-count">${qs.length} questions</div>
    </div>`).join('');
}
renderTopics();

let curTopic='', quizQs=[], curIdx=0, score=0, userAnswers=[], timerInterval=null, timerSecs=45;

function selectTopic(t){
  curTopic=t;
  document.getElementById('settingsTitle').textContent=(TOPIC_ICONS2[t]||'📋')+' '+t;
  document.getElementById('topicSelect').style.display='none';
  document.getElementById('quizSettings').style.display='block';
}
function backToTopics(){
  clearInterval(timerInterval);
  ['quizSettings','quizRunner','quizResults'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('topicSelect').style.display='block';
}
function shuffle(a){return a.sort(()=>Math.random()-0.5);}
function launchQuiz(){
  const n=document.getElementById('numQ').value;
  timerSecs=parseInt(document.getElementById('timerQ').value)||0;
  const order=document.getElementById('orderQ').value;
  let pool=[...ALL_TOPICS[curTopic]];
  if(order==='random') pool=shuffle(pool);
  quizQs=n==='all'?pool:pool.slice(0,Math.min(parseInt(n),pool.length));
  curIdx=0; score=0; userAnswers=[];
  document.getElementById('quizSettings').style.display='none';
  document.getElementById('quizRunner').style.display='block';
  document.getElementById('qTotal').textContent=quizQs.length;
  showQuestion();
}
function showQuestion(){
  if(curIdx>=quizQs.length){endQuiz();return;}
  const q=quizQs[curIdx];
  document.getElementById('qNum').textContent=curIdx+1;
  document.getElementById('pFill').style.width=((curIdx/quizQs.length)*100)+'%';
  document.getElementById('scoreLive').textContent=`Score: ${score} / ${curIdx}`;
  document.getElementById('qArea').innerHTML=`
    <div class="question-card">
      <div class="q-meta"><span class="q-num">Q${curIdx+1}</span><span class="q-topic">${q.topic}</span><span class="q-source">${q.source}</span></div>
      <div class="q-text">${q.q}</div>
      <div class="options-list">
        ${q.opts.map((o,i)=>`<button class="option-btn" id="opt${i}" onclick="selectAns(${i})"><span class="option-letter">${String.fromCharCode(65+i)}</span><span class="option-text">${o}</span></button>`).join('')}
      </div>
      <div class="feedback-box" id="fb"></div>
    </div>
    <button class="next-btn" id="nb" onclick="nextQ()">${curIdx+1<quizQs.length?'Next Question →':'🏁 Finish Quiz'}</button>`;
  window.scrollTo(0,0);
  if(timerSecs>0)startTimer();
}
let timerRem=0;
function startTimer(){
  clearInterval(timerInterval); timerRem=timerSecs;
  const badge=document.getElementById('timerBadge');
  badge.style.display='block'; badge.textContent='⏱ '+timerRem; badge.className='timer-badge';
  timerInterval=setInterval(()=>{
    timerRem--;
    badge.textContent='⏱ '+timerRem;
    if(timerRem<=10) badge.className='timer-badge warn';
    if(timerRem<=0){clearInterval(timerInterval);selectAns(-1);}
  },1000);
}
function selectAns(chosen){
  clearInterval(timerInterval);
  const q=quizQs[curIdx];
  const correct=chosen===q.ans;
  userAnswers.push({q,chosen,correct});
  if(correct) score++;
  q.opts.forEach((_,i)=>{const b=document.getElementById('opt'+i);if(b)b.disabled=true;});
  if(chosen>=0){const cb=document.getElementById('opt'+chosen);if(cb)cb.classList.add(correct?'correct':'wrong');}
  const corrB=document.getElementById('opt'+q.ans);
  if(corrB&&!correct) corrB.classList.add('correct');
  const fb=document.getElementById('fb');
  if(fb){
    fb.className='feedback-box '+(correct?'correct-fb':'wrong-fb');
    fb.style.display='block';
    fb.innerHTML=`<div class="fb-title ${correct?'c':'w'}">${correct?'✅ Correct!':'❌ Incorrect'}</div><div class="fb-exp"><strong>Explanation:</strong> ${q.exp}</div>`;
  }
  const nb=document.getElementById('nb');
  if(nb)nb.style.display='block';
}
function nextQ(){curIdx++;showQuestion();}
function endQuiz(){
  clearInterval(timerInterval);
  document.getElementById('quizRunner').style.display='none';
  document.getElementById('quizResults').style.display='block';
  const pct=Math.round((score/quizQs.length)*100);
  const el=document.getElementById('rScore');
  el.textContent=pct+'%';el.className='result-score '+(pct>=50?'pass':'fail');
  let g='',m='';
  if(pct>=80){g='Excellent! 🏆';m='Outstanding performance!';}
  else if(pct>=65){g='Good Pass 🎉';m='Good work! Review the questions you missed.';}
  else if(pct>=50){g='Pass ✅';m='You passed. Study weaker areas to improve.';}
  else{g='Below Pass 📚';m='Keep studying. Focus on the topics you missed.';}
  document.getElementById('rGrade').textContent=g;
  document.getElementById('rMsg').textContent=m;
  document.getElementById('rC').textContent=score;
  document.getElementById('rW').textContent=quizQs.length-score-userAnswers.filter(a=>a.chosen<0).length;
  document.getElementById('rS').textContent=userAnswers.filter(a=>a.chosen<0).length;
  const resultObj7={cin:userCIN,name:userName,topic:'HIHS2024/'+curTopic,score:pct,correct:score,total:quizQs.length,date:new Date().toISOString()};
  try{ fetch('/api/quiz',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(resultObj7)}); }catch(e){}
  const results=JSON.parse(localStorage.getItem('quizResults')||'[]');
  results.push(resultObj7);
  localStorage.setItem('quizResults',JSON.stringify(results));
  document.getElementById('reviewList').innerHTML=userAnswers.map((ua,i)=>`
    <div class="review-item ${ua.correct?'':'ri-wrong'}">
      <div class="ri-q"><strong>Q${i+1}:</strong> ${ua.q.q}</div>
      <div class="ri-ans" style="color:${ua.correct?'#2ecc71':'#ff6b6b'}">${ua.correct?'✅':'❌'} ${ua.chosen>=0?ua.q.opts[ua.chosen]:'Skipped'}</div>
      ${!ua.correct?`<div class="ri-ans" style="color:#2ecc71">✔ Correct: ${ua.q.opts[ua.q.ans]}</div>`:''}
      <div class="ri-exp-text">${ua.q.exp}</div>
    </div>`).join('');
  window.scrollTo(0,0);
}
function retryQ(){document.getElementById('quizResults').style.display='none';launchQuiz();}
</script>
